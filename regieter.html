<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell">
        <section class="form-card">
            <div class="form-intro">
                <p class="eyebrow">Create Account</p>
                <h1>Registration Form</h1>
                <p class="subtitle">Fill in your details to create your account.</p>
            </div>

            <form id="registrationForm" class="registration-form" novalidate>
                <div class="field-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                </div>

                <div class="field-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                </div>

                <div class="field-row">
                    <div class="field-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="10-digit number">
                    </div>

                    <div class="field-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" placeholder="18+" min="18">
                    </div>
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password">
                </div>

                <div class="field-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password">
                </div>

                <div class="field-group">
                    <label for="course">Course / Department</label>
                    <select id="course" name="course">
                        <option value="">Select an option</option>
                        <option value="computer-science">Computer Science</option>
                        <option value="commerce">Commerce</option>
                        <option value="arts">Arts</option>
                        <option value="science">Science</option>
                    </select>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="terms" name="terms">
                    <label for="terms">I agree to the terms and conditions.</label>
                </div>

                <p id="message" class="message" aria-live="polite"></p>

                <button type="submit" class="submit-button">Register Now</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
